version: "3.9"

services:

  # -----------------------------------------------------------------------
  # Main application
  # -----------------------------------------------------------------------
  aceest-fitness:
    build:
      context: .
      dockerfile: Dockerfile
    image: prasannalakshmi/aceest-fitness:3.2.4
    container_name: aceest-fitness
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_DEBUG: "false"
      APP_VERSION: "3.2.4"
      PORT: "5000"
    volumes:
      - aceest-data:/app
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aceest-net

  # -----------------------------------------------------------------------
  # SonarQube (code quality)
  # -----------------------------------------------------------------------
  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-extensions:/opt/sonarqube/extensions
      - sonar-logs:/opt/sonarqube/logs
    depends_on:
      sonar-db:
        condition: service_healthy
    networks:
      - aceest-net

  sonar-db:
    image: postgres:15-alpine
    container_name: sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aceest-net

volumes:
  aceest-data:
  sonar-data:
  sonar-extensions:
  sonar-logs:
  sonar-db-data:

networks:
  aceest-net:
    driver: bridge
