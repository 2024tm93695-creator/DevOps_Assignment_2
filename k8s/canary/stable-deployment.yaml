# CANARY DEPLOYMENT – Stable (9 replicas → ~90 % of traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  namespace: aceest
  labels:
    app: aceest-fitness
    track: stable
    version: "3.1.2"
spec:
  replicas: 9
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
        version: "3.1.2"
    spec:
      containers:
        - name: aceest-fitness
          image: prasannalakshmi/aceest-fitness:3.1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "3.1.2"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
