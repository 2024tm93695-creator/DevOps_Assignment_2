# CANARY DEPLOYMENT – Canary (1 replica → ~10 % of traffic)
# Monitor metrics; scale up canary and scale down stable to promote.
# Rollback: kubectl scale deployment/aceest-fitness-canary --replicas=0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-canary
  namespace: aceest
  labels:
    app: aceest-fitness
    track: canary
    version: "3.2.4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
        version: "3.2.4"
    spec:
      containers:
        - name: aceest-fitness
          image: prasannalakshmi/aceest-fitness:3.2.4
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "3.2.4"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
