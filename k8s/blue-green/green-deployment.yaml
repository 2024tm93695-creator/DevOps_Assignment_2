# BLUE-GREEN DEPLOYMENT – Green (new version, tested before traffic switch)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
  namespace: aceest
  labels:
    app: aceest-fitness
    slot: green
    version: "3.2.4"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      slot: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        slot: green
        version: "3.2.4"
    spec:
      containers:
        - name: aceest-fitness
          image: prasannalakshmi/aceest-fitness:3.2.4
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "3.2.4"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
