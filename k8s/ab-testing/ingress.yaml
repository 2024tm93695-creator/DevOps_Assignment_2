# A/B TESTING – Nginx Ingress routing
# Stable ingress → Variant A
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-fitness-ingress-a
  namespace: aceest
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-fitness-svc-a
                port:
                  number: 80
---
# Canary ingress → Variant B (50 % of requests by header X-AB-Test: B)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-fitness-ingress-b
  namespace: aceest
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-header: "X-AB-Test"
    nginx.ingress.kubernetes.io/canary-by-header-value: "B"
spec:
  rules:
    - host: aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-fitness-svc-b
                port:
                  number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-svc-a
  namespace: aceest
spec:
  selector:
    app: aceest-fitness
    variant: a
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-svc-b
  namespace: aceest
spec:
  selector:
    app: aceest-fitness
    variant: b
  ports:
    - port: 80
      targetPort: 5000
