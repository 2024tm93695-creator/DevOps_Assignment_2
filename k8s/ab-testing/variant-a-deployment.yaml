# A/B TESTING – Variant A (control group / original UI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-variant-a
  namespace: aceest
  labels:
    app: aceest-fitness
    variant: a
    version: "3.1.2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: a
        version: "3.1.2"
    spec:
      containers:
        - name: aceest-fitness
          image: prasannamanne/aceest-fitness:3.1.2
          ports:
            - containerPort: 5000
          env:
            - name: AB_VARIANT
              value: "A"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
