# A/B TESTING – Variant B (experimental group / new feature)
# Route specific users (e.g. by cookie/header) to variant B via Nginx Ingress
# annotation: nginx.ingress.kubernetes.io/canary: "true"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-variant-b
  namespace: aceest
  labels:
    app: aceest-fitness
    variant: b
    version: "3.2.4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: b
        version: "3.2.4"
    spec:
      containers:
        - name: aceest-fitness
          image: prasannalakshmi/aceest-fitness:3.2.4
          ports:
            - containerPort: 5000
          env:
            - name: AB_VARIANT
              value: "B"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
