sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=3.2.4
sonar.organization=prasannamanne

# Source paths
sonar.sources=.
sonar.tests=tests
sonar.inclusions=app.py
sonar.exclusions=venv/**,reports/**,k8s/**,**/__pycache__/**,*.pyc

# Python-specific settings
sonar.language=py
sonar.python.version=3.9

# Test and coverage reports generated by pytest-cov
sonar.python.coverage.reportPaths=reports/coverage.xml
sonar.python.xunit.reportPath=reports/junit.xml

# Quality gate thresholds
sonar.qualitygate.wait=true

# SonarCloud
sonar.host.url=https://sonarcloud.io
